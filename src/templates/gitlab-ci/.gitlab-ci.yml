image: node:18

stages:
  - install
  - lint
  - test
  - build

cache:
  paths:
    - node_modules/

install:
  stage: install
  script:
    - npm ci

lint:
  stage: lint
  script:
    - npm run lint --if-present

test:
  stage: test
  script:
    - npm test --if-present

build:
  stage: build
  script:
    - npm run build --if-present